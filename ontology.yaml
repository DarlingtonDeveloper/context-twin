# Hand-authored ontology. Unit 2 owns edits (Unit 0 seeded it).
# `description` is the canonical concept text (contract OntologyNode). `exemplars` are
# additional short strings (concept phrasings + realistic example values) that Unit 2's
# classifier embeds and MAX-POOLS over for field-to-node matching — value-bearing
# exemplars separate weak-but-true fields (e.g. an abbreviated `name`) from spurious
# near-misses far better than a single description sentence. Extra keys are ignored by
# the frozen OntologyNode model, so this stays contract-safe.
#
# NOTE: there is deliberately NO 'region' node. crm_b.region must NOT auto-classify; it
# proposes a new node through the control plane. This gap is intentional.
nodes:
  - name: person
    description: a person's name — a human individual's full name, personal name, first and last name, or initials
    exemplars:
      - full name of a person
      - personal name
      - first and last name
      - Colin Marsh
      - Dana Osei
      - C. Marsh
  - name: email
    description: an email address for contacting a person
    exemplars:
      - email address
      - contact email
      - colin.marsh@stripe.com
      - someone@example.com
  - name: role
    description: a job title or professional role held by a person, e.g. VP, Director, Head of Ops
    exemplars:
      - job title
      - professional role or position
      - VP Engineering
      - Director of Platform
      - Head of Operations
      - Operations Lead
  - name: organisation
    description: the name of a company or employer
    exemplars:
      - company name
      - employer name
      - business or organisation
      - Stripe
      - Acme
      - Globex
  - name: phone
    description: a telephone number
    exemplars:
      - telephone number
      - phone number
      - +1 555 123 4567
